<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebook</title>
<style>
    body { margin: 0; background: #5e4630; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
    .frame { width: 95%; max-width: 500px; background: #f4e6c8; border: 12px solid #7a5a3a; border-radius: 15px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h2 { text-align: center; color: #4a3420; margin-top: 0; }
    textarea { width: 100%; height: 220px; border: 2px solid #d2a679; border-radius: 5px; padding: 10px; font-size: 16px; background: #fffaf0; outline: none; box-sizing: border-box; resize: none; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #d2a679; color: white; font-weight: bold; cursor: pointer; }
    button:hover { background: #bc8f62; }
    .nav-btn { background: #a67c52; text-decoration: none; border-radius: 10px; display: block; overflow: hidden; }
    #status { font-size: 12px; color: #7a5a3a; text-align: right; height: 15px; margin-top: 5px; }
</style>
</head>
<body>
<div class="frame">
    <h2>📜 Ghi Chú Của Tớ 📜<br>🌸🌺🌻🌼🌷🌹</h2>
    <textarea id="note">{{ note }}</textarea>
    <div id="status"></div>
    <div class="actions">
        <button type="button" id="undoBtn">⏪ Undo</button>
        <button type="button" id="redoBtn">⏩ Redo</button>
        <a href="/schedule" class="nav-btn"><button type="button" style="background:transparent;">📅 Lịch Hẹn</button></a>
        <a href="/" class="nav-btn"><button type="button" style="background:transparent;">↩️ Thoát</button></a>
    </div>
</div>
<script>
    let timeout = null;
    const textarea = document.getElementById("note");
    const statusDiv = document.getElementById("status");

    textarea.addEventListener("input", () => {
        clearTimeout(timeout);
        statusDiv.innerText = "Đang gõ...";
        timeout = setTimeout(() => {
            fetch("/save", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ content: textarea.value })
            }).then(() => {
                statusDiv.innerText = "Đã lưu tự động";
                setTimeout(() => { statusDiv.innerText = ""; }, 2000);
            });
        }, 800);
    });

    document.getElementById("undoBtn").addEventListener("click", () => {
        fetch("/undo", { method: "POST" }).then(res => res.json()).then(data => {
            textarea.value = data.content;
        });
    });

    document.getElementById("redoBtn").addEventListener("click", () => {
        fetch("/redo", { method: "POST" }).then(res => res.json()).then(data => {
            textarea.value = data.content;
        });
    });
</script>
</body>
</html>
